<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lost Coin – Luke 15</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Georgia,serif;
}

/* broom */

#pointer{
position:fixed;
pointer-events:none;
display:none;
z-index:1000;
font-size:32px;
transform:translate(-50%,-50%);
}

/* popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
color:#ffd700;
padding:16px;
border-radius:10px;
text-align:center;
font-size:1rem;
z-index:2000;
width:min(85%,340px);
}

/* instruction */

#instruction{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:#ffd700;
padding:5px 14px;
border-radius:16px;
font-size:.85rem;
opacity:0;
transition:.4s;
z-index:1500;
}

/* verse panel */

#topArea{
position:absolute;
top:7vh;
left:0;
width:100%;
height:26vh;
background:white;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
text-align:center;
opacity:0;
transition:opacity .5s;
}

.verseBox{
max-width:720px;
width:90%;
font-size:clamp(.95rem,2.5vw,1.3rem);
line-height:1.6;
}

/* floor */

#floor{
position:absolute;
top:33vh;
width:100%;
height:67vh;
background:#0a0a0a;
display:none;
overflow:hidden;
}

/* dust */

.dust{
position:absolute;
width:3px;
height:3px;
background:#888;
border-radius:50%;
}

/* coin */

#coin{
position:absolute;
width:26px;
height:26px;
border-radius:50%;
background:radial-gradient(circle,#e4c463,#8c6b15);
opacity:0;
}

#coin.found{
opacity:1;
box-shadow:0 0 40px gold,0 0 80px gold;
transform:scale(1.4);
transition:.4s;
}

/* heaven */

#heaven{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#cfeeff,#ffffff);
opacity:0;
transition:1s;
}

/* clouds */

.cloud{
position:absolute;
width:180px;
animation:cloudMove 16s linear infinite;
opacity:.9;
}

@keyframes cloudMove{
from{transform:translateX(-200px)}
to{transform:translateX(110vw)}
}

/* final verse */

#bottomVerse{
position:absolute;
bottom:20%;
left:50%;
transform:translateX(-50%);
width:min(85%,640px);
text-align:center;
font-size:clamp(1.1rem,2.5vw,1.6rem);
font-weight:bold;
line-height:1.6;
color:#222;
opacity:0;
transition:.7s;
}

/* MOBILE FIXES */

@media(max-width:480px){

#topArea{
top:9vh;
height:25vh;
}

#floor{
top:34vh;
}

#popup{
top:45%;
font-size:.95rem;
}

}

</style>
</head>

<body>

<div id="pointer">🧹</div>

<div id="instruction"></div>

<div id="popup">
Help a woman who lost her coin find it.<br><br>
<button class="btn btn-warning btn-sm" onclick="startGame()">Start</button>
</div>

<div id="topArea">
<div class="verseBox" id="foundText"></div>
</div>

<div id="floor">
<div id="coin"></div>
</div>

<div id="heaven"></div>
<div id="bottomVerse"></div>

<script>

const pointer=document.getElementById("pointer")
const popup=document.getElementById("popup")
const floor=document.getElementById("floor")
const coin=document.getElementById("coin")
const topArea=document.getElementById("topArea")
const foundText=document.getElementById("foundText")
const heaven=document.getElementById("heaven")
const bottomVerse=document.getElementById("bottomVerse")
const instruction=document.getElementById("instruction")

let found=false
let mouseX=0
let mouseY=0

const SWEEP_RADIUS=70
const COIN_RADIUS=45

function showInstruction(msg){
instruction.innerText=msg
instruction.style.opacity=1
setTimeout(()=>{instruction.style.opacity=0},2500)
}

/* pointer movement */

function updatePointer(x,y){

mouseX=x
mouseY=y

pointer.style.left=x+"px"
pointer.style.top=y+"px"

if(!floor.style.display) return

sweepDust()
detectCoin()

}

window.addEventListener("pointermove",(e)=>updatePointer(e.clientX,e.clientY))

window.addEventListener("touchmove",(e)=>{
let t=e.touches[0]
updatePointer(t.clientX,t.clientY)
})

function startGame(){

popup.style.display="none"

floor.style.display="block"

document.body.style.cursor="none"
pointer.style.display="block"

generateDust()
placeCoin()

showInstruction("Sweep the dusty floor to find the lost coin.")

}

/* dust */

function generateDust(){

for(let i=0;i<220;i++){

let d=document.createElement("div")
d.className="dust"

d.style.left=Math.random()*floor.offsetWidth+"px"
d.style.top=Math.random()*floor.offsetHeight+"px"

floor.appendChild(d)

}

}

function sweepDust(){

document.querySelectorAll(".dust").forEach(d=>{

let rect=d.getBoundingClientRect()

let dx=rect.left-mouseX
let dy=rect.top-mouseY

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<SWEEP_RADIUS){

let x=parseFloat(d.style.left)

if(rect.left<window.innerWidth/2)
d.style.left=(x-15)+"px"
else
d.style.left=(x+15)+"px"

}

})

}

/* coin placement */

function placeCoin(){

const padding=40

let x=Math.random()*(floor.offsetWidth-padding*2)+padding
let y=Math.random()*(floor.offsetHeight-padding*2)+padding

coin.style.left=x+"px"
coin.style.top=y+"px"

}

/* detection */

function detectCoin(){

if(found) return

let c=coin.getBoundingClientRect()

if(
mouseX>c.left-COIN_RADIUS &&
mouseX<c.right+COIN_RADIUS &&
mouseY>c.top-COIN_RADIUS &&
mouseY<c.bottom+COIN_RADIUS
){
foundCoin()
}

}

/* found coin */

function foundCoin(){

found=true

coin.classList.add("found")

showInstruction("You found the lost coin!")

foundText.innerHTML=`
<strong>Luke 15:8–9</strong><br><br>
She gathers her friends and neighbors and celebrates:<br>
<em>“Rejoice with me — I found my lost coin!”</em>
`

topArea.style.opacity=1

setTimeout(()=>heavenScene(),5000)

}

/* heaven */

function heavenScene(){

pointer.style.display="none"
coin.style.display="none"

heaven.style.opacity=1

spawnClouds()

setTimeout(()=>{

bottomVerse.innerHTML=
"In the same way, there is rejoicing in the presence of the angels of God over one sinner who repents.<br><small>Luke 15:10</small>"

bottomVerse.style.opacity=1

},1000)

}

function spawnClouds(){

for(let i=0;i<5;i++){

let c=document.createElement("div")

c.className="cloud"

c.style.top=Math.random()*25+"%"

c.innerHTML=`<svg viewBox="0 0 200 100">
<ellipse cx="60" cy="60" rx="50" ry="30" fill="white"/>
<ellipse cx="110" cy="55" rx="45" ry="28" fill="white"/>
<ellipse cx="150" cy="65" rx="35" ry="25" fill="white"/>
</svg>`

document.body.appendChild(c)

}

}

</script>

</body>
</html>
